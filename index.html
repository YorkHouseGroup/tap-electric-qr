<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tap Electric App</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #ffffff;
      font-family: Arial, sans-serif;
    }
    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      animation: fadeIn 0.6s ease-in;
    }
    .logos img {
      max-width: 140px;
      max-height: 140px;
    }
    .divider {
      width: 1px;
      height: 60px;
      background-color: #cccccc;
    }
    p {
      margin-top: 20px;
      color: #666666;
      font-size: 14px;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logos">
    <img src="blueev.png" alt="BlueEV Logo">
    <div class="divider"></div>
    <img src="warners.png" alt="Warner Hotels Logo">
  </div>
  <p>Getting your charging app ready...</p>

  <script>
    var ua = navigator.userAgent || navigator.vendor;
    var destination;

    if (/iPad|iPhone|iPod/.test(ua)) {
      destination = "https://apps.apple.com/gb/app/tap-electric-ev-charging/id1543010272";
    } else if (/android/i.test(ua)) {
      destination = "https://play.google.com/store/apps/details?id=app.tapelectric.tap";
    } else {
      destination = "https://play.google.com/store/apps/details?id=app.tapelectric.tap";
    }

    setTimeout(function() {
      window.location.replace(destination);
    }, 2000);
  </script>
</body>
</html>
